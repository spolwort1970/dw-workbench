<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="128" cy="128" r="124" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="124" fill="none" stroke="#00a1df" stroke-width="1.5" opacity="0.3"/>

  <!-- Ghost 2.0 -->
  <text x="128" y="155" text-anchor="middle"
        font-family="Consolas, 'Courier New', monospace"
        font-size="120" font-weight="700"
        fill="#39ff14" opacity="0.22"
        filter="url(#textglow)">2.0</text>

  <!-- Subtle arcs -->
  <path d="M 88 56 Q 128 36 168 88" fill="none" stroke="#00a1df" stroke-width="1.5" opacity="0.25" stroke-dasharray="4 6"/>
  <path d="M 88 168 Q 128 220 168 200" fill="none" stroke="#00a1df" stroke-width="1.5" opacity="0.25" stroke-dasharray="4 6"/>

  <!-- Diagonal beam -->
  <line x1="176" y1="80" x2="80" y2="176" stroke="#00a1df" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

  <!-- D node -->
  <circle cx="88" cy="88" r="32" fill="none" stroke="#00a1df" stroke-width="5" filter="url(#glow)"/>
  <text x="88" y="96" text-anchor="middle"
        font-family="Consolas, 'Courier New', monospace"
        font-size="28" font-weight="700" fill="#00a1df">D</text>

  <!-- W node -->
  <circle cx="168" cy="168" r="32" fill="none" stroke="#00a1df" stroke-width="5" filter="url(#glow)"/>
  <text x="168" y="176" text-anchor="middle"
        font-family="Consolas, 'Courier New', monospace"
        font-size="28" font-weight="700" fill="#00a1df">W</text>
</svg>
